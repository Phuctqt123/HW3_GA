<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Class Scheduler - Genetic Algorithm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Giới hạn chiều cao biểu đồ để không chiếm hết màn hình */
        .chart-container {
            position: relative;
            height: 250px;
            width: 100%;
        }
        /* Tô màu nhẹ cho các ô để dễ nhìn */
        .session-card {
            transition: all 0.2s;
        }
        .session-card:hover {
            transform: scale(1.02);
            filter: brightness(0.95);
        }
    </style>
</head>
<body class="bg-gray-50 p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-extrabold text-blue-900 mb-2">Hệ Thống Lập Lịch Tự Động</h1>
        </header>

        <div class="flex justify-center mb-8">
            <button onclick="runGA()" id="runBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-full shadow-xl transform transition hover:-translate-y-1">
                Bắt đầu lập lịch ngay
            </button>
        </div>

        <div id="resultSection" class="hidden">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
                <div class="lg:col-span-1 space-y-4">
                    <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-green-500 text-center">
                        <p class="text-gray-500 uppercase text-xs font-bold tracking-widest">Thời gian chạy</p>
                        <p id="time" class="text-3xl font-black text-gray-800">0s</p>
                    </div>
                    <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-purple-500 text-center">
                        <p class="text-gray-500 uppercase text-xs font-bold tracking-widest">Số thế hệ hội tụ</p>
                        <p id="gens" class="text-3xl font-black text-gray-800">0</p>
                    </div>
                </div>

                <div class="lg:col-span-2 bg-white p-4 rounded-xl shadow-md">
                    <div class="chart-container">
                        <canvas id="fitnessChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-2xl overflow-hidden border border-gray-200">
                <div class="bg-blue-900 text-white p-4 font-bold text-lg text-center uppercase tracking-widest">
                    Thời Khóa Biểu Tối Ưu (Fitness = 0)
                </div>
                <div class="overflow-x-auto">
                    <table class="min-w-full table-fixed border-collapse">
                        <thead>
                            <tr class="bg-gray-100 text-gray-700">
                                <th class="w-24 p-4 border text-center">Ca</th>
                                <th class="p-4 border text-center">Thứ 2</th>
                                <th class="p-4 border text-center">Thứ 3</th>
                                <th class="p-4 border text-center">Thứ 4</th>
                                <th class="p-4 border text-center">Thứ 5</th>
                                <th class="p-4 border text-center">Thứ 6</th>
                            </tr>
                        </thead>
                        <tbody id="timetableBody">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let myChart = null;

        // Hàm tạo màu ngẫu nhiên nhưng dễ nhìn cho từng Lớp (Section)
        const getSectionColor = (sectionId) => {
            const colors = [
                'bg-blue-100 border-blue-500', 'bg-green-100 border-green-500',
                'bg-yellow-100 border-yellow-500', 'bg-red-100 border-red-500',
                'bg-purple-100 border-purple-500', 'bg-pink-100 border-pink-500',
                'bg-indigo-100 border-indigo-500', 'bg-orange-100 border-orange-500'
            ];
            return colors[sectionId % colors.length];
        };

        async function runGA() {
            const btn = document.getElementById('runBtn');
            btn.innerText = "Đang xử lý...";
            btn.disabled = true;

            try {
                const response = await fetch('/run-ga');
                const data = await response.json();

                document.getElementById('resultSection').classList.remove('hidden');
                document.getElementById('time').innerText = data.execution_time + "s";
                document.getElementById('gens').innerText = data.generations;

                renderTable(data.schedule);
                updateChart(data.history);

                // Cuộn xuống bảng tự động
                window.scrollTo({ top: document.getElementById('resultSection').offsetTop, behavior: 'smooth' });

            } catch (error) {
                alert("Có lỗi xảy ra khi kết nối với Backend!");
            } finally {
                btn.innerText = "Bắt đầu lập lịch ngay";
                btn.disabled = false;
            }
        }

        function updateChart(history) {
            const ctx = document.getElementById('fitnessChart').getContext('2d');
            if (myChart) myChart.destroy();

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: history.map((_, i) => i + 1),
                    datasets: [{
                        label: 'Fitness (Càng gần 0 càng tốt)',
                        data: history,
                        borderColor: '#2563eb',
                        backgroundColor: 'rgba(37, 99, 235, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: '#f3f4f6' } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        function renderTable(schedule) {
            const body = document.getElementById('timetableBody');
            body.innerHTML = "";

            for (let slot = 1; slot <= 6; slot++) {
                let row = `<tr class="border-b"><td class="p-4 border font-bold text-center bg-gray-50 text-blue-900">Ca ${slot}</td>`;

                for (let day = 2; day <= 6; day++) {
                    const sessions = schedule.filter(s => s.day === day && s.slot === slot);
                    let content = sessions.map(s => {
                        const colorClass = getSectionColor(s.section);
                        return `
                            <div class="session-card text-[10px] md:text-xs p-2 mb-2 border-l-4 rounded shadow-sm ${colorClass}">
                                <div class="font-bold text-blue-900">Môn: ${s.course.id}</div>
                                <div>Lớp: ${s.section}</div>
                                <div>P: ${s.room.id} | GV: ${s.prof}</div>
                            </div>
                        `;
                    }).join("");

                    row += `<td class="p-2 border align-top min-h-[100px]">${content}</td>`;
                }
                row += "</tr>";
                body.innerHTML += row;
            }
        }
    </script>
</body>
</html>
